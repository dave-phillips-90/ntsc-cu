name: Deploy to GitHub Pages

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        working-directory: web
        run: npm ci

      - name: Detect base path
        id: base
        run: |
          # Use '/' for custom domains (CNAME exists), otherwise '/<repo-name>/'
          if [ -f web/public/CNAME ] || [ -f CNAME ]; then
            echo "path=/" >> "$GITHUB_OUTPUT"
          else
            echo "path=/${GITHUB_REPOSITORY#*/}/" >> "$GITHUB_OUTPUT"
          fi

      - name: Build
        working-directory: web
        run: npm run build
        env:
          VITE_BASE_PATH: ${{ steps.base.outputs.path }}

      - uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
